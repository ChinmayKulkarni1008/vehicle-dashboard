<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Anti-Theft Control Panel</title>
    <!-- Load Telegram Web App Script for native look -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 22px;
            margin: 0 0 5px 0;
            color: #38bdf8;
        }
        .header p {
            font-size: 13px;
            color: #94a3b8;
            margin: 0;
        }
        .card {
            background-color: #1e293b;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 360px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid #334155;
            margin-bottom: 15px;
        }
        .status-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .status-label {
            font-size: 16px;
            font-weight: 600;
        }
        .badge {
            padding: 6px 14px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-secure {
            background-color: #065f46;
            color: #34d399;
            border: 1px solid #059669;
        }
        .log-title {
            font-size: 14px;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .log-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        .time {
            color: #64748b;
        }
        .btn {
            width: 100%;
            max-width: 360px;
            background-color: #0284c7;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #0369a1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Smart Vehicle Guard</h1>
        <p>NodeMCU ESP32 Embedded Security Mesh</p>
    </div>

    <!-- System Status Card -->
    <div class="card">
        <div class="status-container">
            <span class="status-label">Ignition Immobilizer</span>
            <span class="badge badge-secure">Active & Secure</span>
        </div>
    </div>

    <!-- Live Logs Card -->
    <div class="card">
        <p class="log-title">Recent Telemetry Logs</p>
        <div class="log-item">
            <span>System Telemetry Check</span>
            <span class="time">12:45 AM</span>
        </div>
        <div class="log-item">
            <span>WiFi Node Connection Verified</span>
            <span class="time">12:05 AM</span>
        </div>
        <div class="log-item">
            <span>Authorized RFID Scan (UID: 4A B3 C2)</span>
            <span class="time">Yesterday</span>
        </div>
    </div>

    <button class="btn" onclick="closeApp()">Return to Chat</button>

    <script>
        // Initialize Telegram Web App API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expands the app to full height inside Telegram

        function closeApp() {
            tg.close(); // Safely closes the mini app interface
        }
    </script>
</body>
</html>
